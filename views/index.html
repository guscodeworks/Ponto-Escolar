<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | gov.br</title>
    <link href="https://fonts.googleapis.com/css2?family=Rawline:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Rawline', sans-serif;
            background: #f8f8f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        header {
            width: 100%;
            background: #fff;
            padding: 15px 10%;
            border-bottom: 1px solid #ddd;
            box-sizing: border-box;
        }
        .gov-logo {
            font-weight: 900;
            font-size: 20px;
            color: #004580;
        }
        .login-card {
            background: #fff;
            width: 400px;
            margin-top: 80px;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            color: #004580;
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #004580;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #1351b4;
        }
    </style>
</head>
<body>

<header>
    <div class="gov-logo">gov.br</div>
</header>

<div class="login-card">
    <h2>Identificação</h2>

    <form action="dashboard.html" method="get">
        <label>CPF ou Matrícula</label>
        <input type="number" name="user" placeholder="000.000.000-00" required>

        <label>Senha</label>
        <input type="password" name="pass" required>

        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
