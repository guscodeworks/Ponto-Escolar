<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Responsivo</title>
    <link rel="stylesheet" href="teste.css">
</head>
<body>

    <main class="container">
        <!-- TELA DE LOGIN -->
        <div id="tela-login" class="card">
            <h1>Login</h1>
            <div class="input-group">
                <label>CPF do Funcionário</label>
                <input type="tel" id="cpf-login" placeholder="000.000.000-00" maxlength="14">
            </div>
            <button onclick="fazerLogin()" class="btn-primary full-width">Acessar</button>
        </div>

        <!-- TELA DE PONTO -->
        <div id="tela-ponto" class="card" style="display: none;">
            <header class="card-header">
                <span id="user-display">CPF: 000...</span>
                <button onclick="logout()" class="btn-exit">Sair</button>
            </header>

            <div class="relogio-container">
                <p id="status-msg">Pronto para bater o ponto</p>
                <h2 id="relogio">00:00:00</h2>
            </div>

            <div class="grid-acoes">
                <button id="btn-1" class="btn-ponto" onclick="registrar(1)">Entrada Expediente</button>
                <button id="btn-2" class="btn-ponto" onclick="registrar(2)" disabled>Saída Almoço</button>
                <button id="btn-3" class="btn-ponto" onclick="registrar(3)" disabled>Volta Almoço</button>
                <button id="btn-4" class="btn-ponto" onclick="registrar(4)" disabled>Saída Expediente</button>
            </div>

            <div class="historico">
                <h3>Registros de Hoje</h3>
                <ul id="lista-ponto"></ul>
            </div>
        </div>
    </main>

    <script src="teste.js"></script>
</body>
</html>
