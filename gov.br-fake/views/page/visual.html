<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Escolar</title>

    <link rel="stylesheet" href="/assets/css/saladofuturo/visual.css">
    <script src="/assets/js/saladofuturo/visual.js" defer></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <aside class="sidebar">

        <div class="logo">
            <img src="img/logo-sala-futuro.png" alt="Sala do Futuro">
        </div>

        <nav>
            <ul>
                <li class="active">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </li>
            </ul>
        </nav>

    </aside>

    <main class="content">

        <header class="topbar">

            <div></div>

            <div class="user-info">
                <i class="fas fa-bell"></i>

                <div class="avatar">
                    ID
                </div>

                <span>Administrador Local</span>
            </div>

        </header>

        <section class="welcome-card">

            <h1>Bem-vindo ao Ponto Escolar</h1>

            <p>
                Sistema de gerenciamento de frequência e registro de ponto escolar.
            </p>

        </section>

        <section class="gerenciar-container">

            <div class="gerenciar-card" id="gerenciarCard">

                <div class="card-text">
                    <span>Acessar</span>
                    <h2>Gerenciar Pontos</h2>
                </div>

                <button id="btnGerenciar">
                    <i class="fas fa-arrow-right"></i>
                </button>

            </div>

        </section>

    </main>


</body>
</html>
